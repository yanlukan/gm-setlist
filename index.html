<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>GM Setlist</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --text: #ffffff;
      --text-muted: #888888;
      --badge-bg: #333333;
      --section-verse: #4a9eff;
      --section-chorus: #4ade80;
      --section-bridge: #fb923c;
      --section-prechorus: #c084fc;
      --section-intro: #888888;
      --section-default: #888888;
      --edit-border: #f59e0b;
      --picker-bg: #2a2a2a;
    }
    body.light {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666666;
      --badge-bg: #e5e7eb;
      --edit-border: #d97706;
      --picker-bg: #f3f4f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    #top-bar { padding: 12px 16px; max-width: 700px; width: 100%; margin: 0 auto; }
    #chord-area, #notes-area, #add-section-btn { max-width: 700px; width: 100%; margin-left: auto; margin-right: auto; }
    #title-row { display: flex; justify-content: space-between; align-items: center; }
    #song-title { font-size: 28px; font-weight: bold; }
    #controls { display: flex; gap: 8px; }
    #controls button { min-width: 44px; min-height: 44px; font-size: 16px;
      background: var(--badge-bg); color: var(--text); border: none; border-radius: 8px; cursor: pointer; }
    #meta-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .badge { background: var(--badge-bg); padding: 4px 10px; border-radius: 12px; font-size: 13px; }
    #transpose-controls { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    #transpose-controls button { min-width: 44px; min-height: 44px; font-size: 20px;
      background: var(--badge-bg); color: var(--text); border: none; border-radius: 8px; cursor: pointer; }
    #chord-area { flex: 1; padding: 12px 16px; display: flex; flex-direction: column;
      justify-content: center; gap: 4px; overflow: hidden; }
    body.editing #chord-area { justify-content: flex-start; overflow-y: auto; }
    .section-row { display: flex; align-items: baseline; gap: 8px; }
    .section-label { min-width: 72px; max-width: 90px; font-size: 11px; font-weight: 600; text-transform: uppercase;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .section-chords { flex: 1; font-size: 32px; font-weight: bold; letter-spacing: 1px; word-spacing: 14px; }
    .section-verse { color: var(--section-verse); }
    .section-chorus { color: var(--section-chorus); }
    .section-bridge { color: var(--section-bridge); }
    .section-prechorus { color: var(--section-prechorus); }
    .section-intro { color: var(--section-intro); }
    .section-default { color: var(--section-default); }
    #notes-area { padding: 8px 16px; font-size: 14px; color: var(--text-muted); font-style: italic;
      border-top: 1px solid var(--badge-bg); min-height: 32px; }
    #notes-area:empty::before { content: 'Notes...'; opacity: 0.4; }
    #notes-area.editable { outline: none; background: var(--badge-bg); border-radius: 4px; }
    #bottom-bar { padding: 8px 16px; display: flex; align-items: center; gap: 12px;
      border-top: 1px solid var(--badge-bg); min-height: 56px; }
    #song-list { display: flex; gap: 6px; overflow-x: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .song-btn { white-space: nowrap; padding: 8px 12px; border: none; border-radius: 8px;
      background: var(--badge-bg); color: var(--text-muted); font-size: 13px; cursor: pointer; min-height: 44px; }
    .song-btn.active { background: #4a9eff; color: #fff; }
    body.editing #chord-area { border: 2px solid var(--edit-border); border-radius: 8px; }
    .section-chords.editable { background: var(--badge-bg); border-radius: 4px; padding: 2px 6px; outline: none; }
    .section-label.editable { background: var(--badge-bg); border-radius: 4px; padding: 2px 4px; outline: none;
      min-width: auto; border-bottom: 2px dashed var(--edit-border); }
    #reset-btn { background: #ef4444 !important; color: #fff !important; }
    #badge-capo { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    #badge-capo.capo-off { text-decoration: line-through; opacity: 0.5; }

    /* Edit mode section controls */
    .section-controls { display: none; flex-shrink: 0; gap: 2px; align-items: center; }
    body.editing .section-controls { display: flex; }
    .section-controls button { width: 28px; height: 28px; border: none; border-radius: 4px;
      background: var(--badge-bg); color: var(--text-muted); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0; }
    .section-controls button:active { opacity: 0.7; }
    .btn-delete { background: #ef4444 !important; color: #fff !important; }
    #add-section-btn { display: none; width: 100%; padding: 8px; margin-top: 4px;
      border: 2px dashed var(--text-muted); border-radius: 8px; background: transparent;
      color: var(--text-muted); font-size: 14px; cursor: pointer; }
    body.editing #add-section-btn { display: block; }
    #section-picker { display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--picker-bg); border-top: 2px solid var(--edit-border);
      padding: 12px; z-index: 101; }
    #section-picker.visible { display: block; }
    #section-picker h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
    .section-type-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .section-type-chip { padding: 10px 16px; border-radius: 8px; border: none;
      background: var(--badge-bg); color: var(--text); font-size: 15px; font-weight: 600;
      cursor: pointer; min-height: 44px; }
    .section-type-chip:active { opacity: 0.7; }
    .section-type-chip.custom { border: 2px dashed var(--text-muted); background: transparent;
      color: var(--text-muted); }
    #custom-section-input { display: none; margin-top: 10px; padding: 10px; width: 100%;
      border-radius: 8px; border: 2px solid var(--edit-border); background: var(--bg);
      color: var(--text); font-size: 16px; font-weight: 600; }
    #section-picker-close { position: absolute; top: 12px; right: 12px; background: var(--badge-bg);
      color: var(--text); border: none; border-radius: 6px; padding: 4px 12px; font-size: 14px; cursor: pointer; }

    /* Chord picker */
    #chord-picker { display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--picker-bg); border-top: 2px solid var(--edit-border);
      padding: 8px 12px; z-index: 100; max-height: 45vh; overflow-y: auto; }
    #chord-picker.visible { display: block; }
    #chord-picker h3 { font-size: 12px; color: var(--text-muted); margin: 4px 0; text-transform: uppercase; }
    .chord-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chord-chip { padding: 6px 12px; border-radius: 6px; border: none;
      background: var(--badge-bg); color: var(--text); font-size: 16px; font-weight: bold;
      cursor: pointer; min-width: 44px; min-height: 36px; text-align: center; }
    .chord-chip:active { opacity: 0.7; }
    .chord-chip.diatonic { border: 2px solid #4a9eff; }
    #picker-close { position: absolute; top: 8px; right: 12px; background: var(--badge-bg);
      color: var(--text); border: none; border-radius: 6px; padding: 4px 12px; font-size: 14px; cursor: pointer; }
    #picker-more { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--text-muted);
      background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; }

    /* Chord chart modal */
    #chord-chart-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
    #chord-chart-modal.visible { display: flex; }
    #chord-chart-box { background: var(--bg); border: 2px solid var(--badge-bg); border-radius: 16px;
      padding: 20px; text-align: center; min-width: 200px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
    #chord-chart-name { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
    #chord-chart-svg { display: block; margin: 0 auto; }
    #chord-chart-fret { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    #chord-chart-close { margin-top: 12px; padding: 8px 24px; border: none; border-radius: 8px;
      background: var(--badge-bg); color: var(--text); font-size: 16px; cursor: pointer; min-height: 44px; }

    /* Setlist management screen */
    #setlist-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg); z-index: 150; flex-direction: column; overflow-y: auto; }
    #setlist-screen.visible { display: flex; }
    #setlist-header { padding: 16px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--badge-bg); }
    #setlist-header h2 { font-size: 24px; font-weight: bold; }
    #setlist-close { background: var(--badge-bg); color: var(--text); border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 16px; cursor: pointer; min-height: 44px; }
    #setlist-songs { flex: 1; padding: 8px 16px; overflow-y: auto; }
    .setlist-item { display: flex; align-items: center; gap: 12px; padding: 12px 8px;
      border-bottom: 1px solid var(--badge-bg); }
    .setlist-item .drag-handle { font-size: 20px; color: var(--text-muted); cursor: grab;
      user-select: none; -webkit-user-select: none; padding: 0 4px; }
    .setlist-item .song-info { flex: 1; }
    .setlist-item .song-info .song-name { font-size: 16px; font-weight: 600; }
    .setlist-item .song-info .song-meta { font-size: 12px; color: var(--text-muted); }
    .setlist-item .remove-btn { background: #ef4444; color: #fff; border: none; border-radius: 6px;
      padding: 6px 12px; font-size: 14px; cursor: pointer; min-height: 36px; }
    .setlist-item.dragging { opacity: 0.5; background: var(--badge-bg); border-radius: 8px; }
    #setlist-add-btn { margin: 12px 16px; padding: 12px; border: 2px dashed var(--text-muted);
      border-radius: 8px; background: transparent; color: var(--text-muted); font-size: 16px;
      cursor: pointer; text-align: center; }
    #setlist-tabs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
      border-bottom: 1px solid var(--badge-bg); -webkit-overflow-scrolling: touch; }
    .setlist-tab { padding: 8px 14px; border: none; border-radius: 8px; background: var(--badge-bg);
      color: var(--text-muted); font-size: 14px; cursor: pointer; white-space: nowrap; min-height: 36px; }
    .setlist-tab.active { background: #4a9eff; color: #fff; }
    #new-setlist-btn { padding: 8px 14px; border: 2px dashed var(--text-muted); border-radius: 8px;
      background: transparent; color: var(--text-muted); font-size: 14px; cursor: pointer;
      white-space: nowrap; min-height: 36px; }
    #setlist-name-input { padding: 8px 12px; border: 2px solid var(--edit-border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 16px; font-weight: 600; width: 100%;
      margin: 8px 16px; display: none; }
    .setlist-actions { display: flex; gap: 8px; padding: 8px 16px; }
    .setlist-actions button { padding: 8px 14px; border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; min-height: 36px; }
    #rename-setlist-btn { background: var(--badge-bg); color: var(--text); }
    #delete-setlist-btn { background: #ef4444; color: #fff; }
    #setlist-btn { background: var(--badge-bg); color: var(--text); border: none; border-radius: 8px;
      padding: 4px 10px; font-size: 13px; cursor: pointer; min-height: 36px; }

    /* Diagrams mode — show chord charts inline */
    #diagrams-bar { display: none; padding: 8px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid var(--badge-bg); max-width: 700px; width: 100%; margin: 0 auto; }
    #diagrams-bar.visible { display: flex; gap: 12px; flex-shrink: 0; }
    .diagram-card { text-align: center; flex-shrink: 0; }
    .diagram-card .diagram-label { font-size: 13px; font-weight: bold; margin-bottom: 2px; }
    .diagram-card .diagram-pos { font-size: 10px; color: var(--text-muted); }
    #diagrams-btn { background: var(--badge-bg); color: var(--text); border: none; border-radius: 8px;
      padding: 4px 10px; font-size: 13px; cursor: pointer; min-height: 36px; }
    #diagrams-btn.active { background: #4a9eff; color: #fff; }

    /* Stage mode — maximum contrast */
    body.stage { --bg: #000000; --text: #ffffff; --text-muted: #999999; --badge-bg: #222222;
      --section-verse: #ffffff; --section-chorus: #ffffff; --section-bridge: #ffffff;
      --section-prechorus: #ffffff; --section-intro: #cccccc; --section-default: #cccccc;
      --picker-bg: #111111; }

    /* Song position badge */
    #position-badge { position: absolute; top: 8px; right: 8px; font-size: 18px; font-weight: bold;
      color: var(--text-muted); pointer-events: none; z-index: 1; }

    /* Swipe animation */
    #chord-area { position: relative; transition: none; }
    #chord-area.slide-left { animation: slideLeft 200ms ease-out; }
    #chord-area.slide-right { animation: slideRight 200ms ease-out; }
    @keyframes slideLeft { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideRight { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Stay-awake tip */
    #awake-tip { padding: 10px 16px; background: #2563eb; color: #fff; font-size: 13px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    #awake-tip button { background: transparent; border: 1px solid rgba(255,255,255,0.5);
      color: #fff; padding: 4px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <header id="top-bar">
    <div id="title-row">
      <h1 id="song-title"></h1>
      <div id="controls">
        <button id="edit-btn">Edit</button>
        <button id="stage-btn">Stage</button>
        <button id="theme-btn"></button>
      </div>
    </div>
    <div id="meta-row">
      <span class="badge" id="badge-key"></span>
      <span class="badge" id="badge-bpm"></span>
      <span class="badge" id="badge-time"></span>
      <span class="badge" id="badge-capo"></span>
      <button id="diagrams-btn">Chords</button>
      <button id="setlist-btn">Setlist</button>
      <div id="transpose-controls">
        <button id="transpose-down">&minus;</button>
        <button id="transpose-up">+</button>
      </div>
    </div>
  </header>
  <div id="awake-tip" style="display:none">
    <span>Tip: Set Auto-Lock to "Never" in iPad Settings before your gig</span>
    <button id="awake-dismiss">Got it</button>
  </div>
  <div id="diagrams-bar"></div>
  <main id="chord-area">
    <span id="position-badge"></span>
  </main>
  <button id="add-section-btn">+ Add Section</button>
  <div id="notes-area"></div>
  <footer id="bottom-bar">
    <nav id="song-list"></nav>
  </footer>

  <!-- Chord chart modal -->
  <div id="chord-chart-modal">
    <div id="chord-chart-box">
      <div id="chord-chart-name"></div>
      <svg id="chord-chart-svg" width="160" height="180" viewBox="0 0 160 180"></svg>
      <div id="chord-chart-fret"></div>
      <button id="chord-chart-close">Close</button>
    </div>
  </div>

  <!-- Setlist management screen -->
  <div id="setlist-screen">
    <div id="setlist-header">
      <h2>Setlists</h2>
      <button id="setlist-close">Done</button>
    </div>
    <div id="setlist-tabs"></div>
    <input type="text" id="setlist-name-input" placeholder="Setlist name...">
    <div class="setlist-actions">
      <button id="rename-setlist-btn">Rename</button>
      <button id="delete-setlist-btn">Delete Setlist</button>
    </div>
    <div id="setlist-songs"></div>
    <button id="setlist-add-btn">+ Add Song Manually</button>
  </div>

  <!-- Section picker panel -->
  <div id="section-picker">
    <button id="section-picker-close">&times;</button>
    <h3>Add Section</h3>
    <div class="section-type-grid" id="section-type-grid"></div>
    <input type="text" id="custom-section-input" placeholder="Type section name...">
  </div>

  <!-- Chord picker panel -->
  <div id="chord-picker">
    <button id="picker-close">Done</button>
    <div id="picker-content"></div>
  </div>

  <script>
const SONGS = [
  { title: "Faith", artist: "George Michael", key: "B", bpm: 96, timeSignature: "4/4", capo: null,
    notes: "Iconic fingerpicked intro riff on Telecaster. Recording is slightly sharp (~446Hz).",
    sections: [

      { name: "Solo", chords: "B  E  B  E" }, { name: "Outro", chords: "B  E  B" }] },

      { name: "Intro", chords: "D  G  C  D  G  C" }, { name: "Verse", chords: "D  G  A  G  D  G  A" },

    sections: [

      { name: "Chorus", chords: "Bbm  Gb  Ab  Gb  Ab  Bbm  Gb  Ab  Gb  Ab  Bbm" },

  { title: "Outside", artist: "George Michael", key: "Gm", bpm: 122, timeSignature: "4/4", capo: null,

      { name: "Verse", chords: "Bb  Ab  Bb  Ab  Gb  Ab  Bb  Gb  Ab  F" },

      { name: "Outro", chords: "Bb  Ab  Bb  Ab  Bb" }] },
  { title: "Freedom! '90", artist: "George Michael", key: "G", bpm: 92, timeSignature: "4/4", capo: null,
    notes: "Mixolydian feel (I\u2013bVII\u2013IV = G\u2013F\u2013C). First chorus arrives nearly 2 minutes in.",
    sections: [

    sections: [

    sections: [

  </script>
  <script>
    // ===== STATE =====
    let currentIndex = 0;
    let editMode = false;
    let pickerTarget = null;

    // ===== MUSIC THEORY =====
    const SHARPS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const FLATS  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
    const FLAT_KEYS = ['F','Bb','Eb','Ab','Db','Gb','Dm','Gm','Cm','Fm','Bbm','Ebm'];

    // Diatonic chords for major keys (semitone intervals from root)
    // I  ii  iii  IV  V  vi  vii°
    const MAJOR_PATTERN = [
      { interval: 0, quality: '', type: 'maj' },
      { interval: 2, quality: 'm', type: 'min' },
      { interval: 4, quality: 'm', type: 'min' },
      { interval: 5, quality: '', type: 'maj' },
      { interval: 7, quality: '', type: 'maj' },
      { interval: 9, quality: 'm', type: 'min' },
      { interval: 11, quality: 'dim', type: 'dim' },
    ];
    // Natural minor: i  ii°  III  iv  v  VI  VII
    const MINOR_PATTERN = [
      { interval: 0, quality: 'm', type: 'min' },
      { interval: 2, quality: 'dim', type: 'dim' },
      { interval: 3, quality: '', type: 'maj' },
      { interval: 5, quality: 'm', type: 'min' },
      { interval: 7, quality: 'm', type: 'min' },
      { interval: 8, quality: '', type: 'maj' },
      { interval: 10, quality: '', type: 'maj' },
    ];

    function parseChord(chord) {
      const match = chord.match(/^([A-G][#b]?)(.*)/);
      if (!match) return null;
      return { root: match[1], quality: match[2] };
    }

    function noteIndex(note) {
      let idx = SHARPS.indexOf(note);
      if (idx === -1) idx = FLATS.indexOf(note);
      return idx;
    }

    function transposeNote(note, semitones, useFlats) {
      const idx = noteIndex(note);
      if (idx === -1) return note;
      const newIdx = ((idx + semitones) % 12 + 12) % 12;
      return useFlats ? FLATS[newIdx] : SHARPS[newIdx];
    }

    function shouldUseFlats(originalKey, semitones) {
      const parsed = parseChord(originalKey);
      if (!parsed) return false;
      const targetIdx = ((noteIndex(parsed.root) + semitones) % 12 + 12) % 12;
      const sharpNote = SHARPS[targetIdx];
      const flatNote = FLATS[targetIdx];
      const sharpKey = sharpNote + parsed.quality;
      const flatKey = flatNote + parsed.quality;
      // Check both sharp and flat spellings against known flat keys
      return FLAT_KEYS.includes(sharpKey) || FLAT_KEYS.includes(sharpNote) ||
             FLAT_KEYS.includes(flatKey) || FLAT_KEYS.includes(flatNote);
    }

    function transposeChord(chord, semitones, useFlats) {
      if (semitones === 0) return chord;
      if (chord.includes('/')) {
        const [main, bass] = chord.split('/');
        return transposeChord(main, semitones, useFlats) + '/' + transposeChord(bass, semitones, useFlats);
      }
      const parsed = parseChord(chord);
      if (!parsed) return chord;
      return transposeNote(parsed.root, semitones, useFlats) + parsed.quality;
    }

    function transposeChords(chordsStr, semitones, songKey) {
      if (semitones === 0) return chordsStr;
      const useFlats = shouldUseFlats(songKey, semitones);
      return chordsStr.split(/\s+/).map(c => transposeChord(c, semitones, useFlats)).join('  ');
    }

    function isMinorKey(key) {
      const parsed = parseChord(key);
      return parsed && parsed.quality.startsWith('m') && !parsed.quality.startsWith('maj');
    }

    function getDiatonicChords(songKey) {
      const parsed = parseChord(songKey);
      if (!parsed) return [];
      const rootIdx = noteIndex(parsed.root);
      const useFlats = FLAT_KEYS.includes(songKey) || FLAT_KEYS.includes(parsed.root);
      const scale = useFlats ? FLATS : SHARPS;
      const pattern = isMinorKey(songKey) ? MINOR_PATTERN : MAJOR_PATTERN;
      return pattern.map(p => {
        const idx = (rootIdx + p.interval) % 12;
        return scale[idx] + p.quality;
      });
    }

    function getAllChords(songKey) {
      const parsed = parseChord(songKey);
      if (!parsed) return [];
      const useFlats = FLAT_KEYS.includes(songKey) || FLAT_KEYS.includes(parsed.root);
      const scale = useFlats ? FLATS : SHARPS;
      const qualities = ['', 'm', '7', 'm7', 'maj7', 'sus4', 'sus2', 'dim', 'aug', '9', 'add9', '6'];
      const chords = [];
      scale.forEach(note => {
        qualities.forEach(q => chords.push(note + q));
      });
      return chords;
    }

    // ===== KEY MANAGEMENT =====
    function getCurrentKey(song) {
      return localStorage.getItem('cheatsheet-key-' + song.title) || song.key;
    }

    function updateKeyBadge(song) {
      const currentKey = getCurrentKey(song);
      const badge = document.getElementById('badge-key');
      if (currentKey !== song.key) {
        badge.textContent = 'Key: ' + currentKey + ' (orig ' + song.key + ')';
      } else {
        badge.textContent = 'Key: ' + currentKey;
      }
    }

    // Permanently transpose all chords up or down by 1 semitone
    function permanentTranspose(semitones) {
      if (editMode) return;
      const song = SONGS[currentIndex];
      const currentKey = getCurrentKey(song);
      const sections = getEditedSections(song);
      const useFlats = shouldUseFlats(currentKey, semitones);

      const newSections = sections.map(s => ({
        name: s.name,
        chords: s.chords.split(/\s+/).filter(c => c).map(c => transposeChord(c, semitones, useFlats)).join('  ')
      }));

      const newKey = transposeChord(currentKey, semitones, useFlats);
      localStorage.setItem('cheatsheet-key-' + song.title, newKey);
      saveStructure(song, newSections);
      renderSong();
    }

    // ===== SECTION HELPERS =====
    function sectionType(name) {
      const n = name.toLowerCase();
      if (n.includes('verse')) return 'verse';
      if (n.includes('chorus')) return 'chorus';
      if (n.includes('bridge')) return 'bridge';
      if (n.includes('pre-chorus') || n.includes('prechorus')) return 'prechorus';
      if (n.includes('intro') || n.includes('outro')) return 'intro';
      return 'default';
    }

    function getEditedSections(song) {
      const saved = localStorage.getItem('cheatsheet-sections-' + song.title);
      if (saved) return JSON.parse(saved);
      return song.sections.map(s => ({ name: s.name, chords: s.chords }));
    }

    function saveStructure(song, sections) {
      const orig = song.sections;
      const changed = sections.length !== orig.length ||
        sections.some((s, i) => !orig[i] || s.name !== orig[i].name || s.chords !== orig[i].chords);
      if (changed) {
        localStorage.setItem('cheatsheet-sections-' + song.title, JSON.stringify(sections));
      } else {
        localStorage.removeItem('cheatsheet-sections-' + song.title);
      }
    }

    // ===== AUTO SCALE =====
    function autoScaleFont() {
      const chordArea = document.getElementById('chord-area');
      const rows = chordArea.querySelectorAll('.section-chords');
      let fontSize = 32;
      rows.forEach(r => r.style.fontSize = fontSize + 'px');
      while (chordArea.scrollHeight > chordArea.clientHeight && fontSize > 18) {
        fontSize -= 2;
        rows.forEach(r => r.style.fontSize = fontSize + 'px');
      }
    }

    // ===== RENDER =====
    function renderBottomBar() {
      const songs = getSetlistSongs();
      const nav = document.getElementById('song-list');
      nav.innerHTML = '';
      songs.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = 'song-btn' + (i === currentIndex ? ' active' : '');
        btn.textContent = song.shortTitle || song.title;
        btn.addEventListener('click', () => {
          currentIndex = i;
          exitEditMode();
          renderSong();
        });
        nav.appendChild(btn);
      });
      const activeBtn = nav.querySelector('.song-btn.active');
      if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }

    function renderSong() {
      const songs = getSetlistSongs();
      if (currentIndex >= songs.length) currentIndex = Math.max(0, songs.length - 1);
      const song = songs[currentIndex];
      if (!song) return;
      const sections = getEditedSections(song);

      document.getElementById('song-title').textContent = song.title;
      document.getElementById('badge-bpm').textContent = song.bpm + ' BPM';
      document.getElementById('badge-time').textContent = song.timeSignature;
      document.getElementById('badge-capo').style.display = 'none';
      updateKeyBadge(song);

      // Position badge
      document.getElementById('position-badge').textContent = (currentIndex + 1) + ' / ' + songs.length;

      const chordArea = document.getElementById('chord-area');
      const positionBadge = document.getElementById('position-badge');
      chordArea.innerHTML = '';
      chordArea.appendChild(positionBadge);
      sections.forEach((section, i) => {
        chordArea.appendChild(createSectionRow(section, i, sections.length));
      });

      const notesArea = document.getElementById('notes-area');
      const savedNotes = localStorage.getItem('cheatsheet-notes-' + song.title);
      notesArea.textContent = savedNotes !== null ? savedNotes : (song.notes || '');

      if (diagramsVisible) renderDiagramsBar();
      autoScaleFont();
      renderBottomBar();
      attachChordTapHandlers();
    }

    function createSectionRow(section, index, total) {
      const row = document.createElement('div');
      row.className = 'section-row';
      row.dataset.index = index;

      const label = document.createElement('span');
      label.className = 'section-label section-' + sectionType(section.name);
      label.textContent = section.name;

      const chords = document.createElement('span');
      chords.className = 'section-chords';
      chords.textContent = section.chords;

      // Edit controls
      const controls = document.createElement('span');
      controls.className = 'section-controls';

      const upBtn = document.createElement('button');
      upBtn.textContent = '\u25B2';
      upBtn.title = 'Move up';
      upBtn.addEventListener('click', () => moveSection(index, -1));

      const downBtn = document.createElement('button');
      downBtn.textContent = '\u25BC';
      downBtn.title = 'Move down';
      downBtn.addEventListener('click', () => moveSection(index, 1));

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = '\u2715';
      delBtn.title = 'Delete section';
      delBtn.addEventListener('click', () => deleteSection(index));

      controls.appendChild(upBtn);
      controls.appendChild(downBtn);
      controls.appendChild(delBtn);

      row.appendChild(controls);
      row.appendChild(label);
      row.appendChild(chords);
      return row;
    }

    // ===== CHORD PICKER =====
    function showChordPicker(chordEl) {
      pickerTarget = chordEl;
      const song = SONGS[currentIndex];
      const currentKey = getCurrentKey(song);
      const diatonic = getDiatonicChords(currentKey);
      const picker = document.getElementById('chord-picker');
      const content = document.getElementById('picker-content');
      content.innerHTML = '';

      // Diatonic section
      const dHead = document.createElement('h3');
      dHead.textContent = 'In Key (' + currentKey + ')';
      content.appendChild(dHead);
      const dGrid = document.createElement('div');
      dGrid.className = 'chord-grid';
      diatonic.forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'chord-chip diatonic';
        chip.textContent = c;
        chip.addEventListener('click', () => insertChord(c));
        dGrid.appendChild(chip);
      });
      // Add common 7th variants of diatonic chords
      diatonic.forEach(c => {
        const p = parseChord(c);
        if (!p) return;
        const seventh = p.root + (p.quality === '' ? '7' : (p.quality === 'm' ? 'm7' : ''));
        if (seventh !== c) {
          const chip = document.createElement('button');
          chip.className = 'chord-chip diatonic';
          chip.textContent = seventh;
          chip.addEventListener('click', () => insertChord(seventh));
          dGrid.appendChild(chip);
        }
      });
      content.appendChild(dGrid);

      // More button to expand all chords
      const moreBtn = document.createElement('button');
      moreBtn.id = 'picker-more';
      moreBtn.textContent = 'Show all chords...';
      moreBtn.addEventListener('click', () => {
        moreBtn.style.display = 'none';
        allSection.style.display = '';
      });
      content.appendChild(moreBtn);

      // All chords (hidden initially)
      const allSection = document.createElement('div');
      allSection.style.display = 'none';
      const aHead = document.createElement('h3');
      aHead.textContent = 'All Chords';
      allSection.appendChild(aHead);
      const aGrid = document.createElement('div');
      aGrid.className = 'chord-grid';
      getAllChords(song.key).forEach(c => {
        const chip = document.createElement('button');
        chip.className = 'chord-chip';
        chip.textContent = c;
        chip.addEventListener('click', () => insertChord(c));
        aGrid.appendChild(chip);
      });
      allSection.appendChild(aGrid);
      content.appendChild(allSection);

      picker.classList.add('visible');
    }

    function insertChord(chord) {
      if (!pickerTarget) return;
      const current = pickerTarget.textContent.trim();
      pickerTarget.textContent = current ? current + '  ' + chord : chord;
    }

    function hideChordPicker() {
      document.getElementById('chord-picker').classList.remove('visible');
      pickerTarget = null;
    }

    // ===== EDIT MODE =====
    function enterEditMode() {
      editMode = true;
      document.body.classList.add('editing');
      document.getElementById('edit-btn').textContent = 'Done';

      let resetBtn = document.getElementById('reset-btn');
      if (!resetBtn) {
        resetBtn = document.createElement('button');
        resetBtn.id = 'reset-btn';
        resetBtn.textContent = 'Reset';
        resetBtn.addEventListener('click', resetEdits);
        document.getElementById('controls').appendChild(resetBtn);
      }
      resetBtn.style.display = '';

      // Make chords, labels, and notes editable
      document.querySelectorAll('.section-chords').forEach(el => {
        el.contentEditable = true;
        el.classList.add('editable');
        el.addEventListener('focus', () => showChordPicker(el));
      });
      document.querySelectorAll('.section-label').forEach(el => {
        el.contentEditable = true;
        el.classList.add('editable');
      });
      const notesEl = document.getElementById('notes-area');
      notesEl.contentEditable = true;
      notesEl.classList.add('editable');
    }

    function exitEditMode() {
      if (!editMode) return;
      editMode = false;
      document.body.classList.remove('editing');
      document.getElementById('edit-btn').textContent = 'Edit';
      const resetBtn = document.getElementById('reset-btn');
      if (resetBtn) resetBtn.style.display = 'none';

      hideChordPicker();
      hideSectionPicker();
      saveCurrentStructure();

      document.querySelectorAll('.section-chords').forEach(el => {
        el.contentEditable = false;
        el.classList.remove('editable');
      });
      document.querySelectorAll('.section-label').forEach(el => {
        el.contentEditable = false;
        el.classList.remove('editable');
      });
      const notesEl = document.getElementById('notes-area');
      notesEl.contentEditable = false;
      notesEl.classList.remove('editable');
      // Save notes
      const song = SONGS[currentIndex];
      const notesText = notesEl.textContent.trim();
      if (notesText !== (song.notes || '')) {
        localStorage.setItem('cheatsheet-notes-' + song.title, notesText);
      } else {
        localStorage.removeItem('cheatsheet-notes-' + song.title);
      }

      autoScaleFont();
    }

    function saveCurrentStructure() {
      const song = SONGS[currentIndex];
      const rows = document.querySelectorAll('.section-row');
      const sections = [];
      rows.forEach(row => {
        const label = row.querySelector('.section-label');
        const chords = row.querySelector('.section-chords');
        if (label && chords) {
          sections.push({ name: label.textContent.trim(), chords: chords.textContent.trim() });
        }
      });
      saveStructure(song, sections);
    }

    function resetEdits() {
      const song = SONGS[currentIndex];
      localStorage.removeItem('cheatsheet-sections-' + song.title);
      localStorage.removeItem('cheatsheet-notes-' + song.title);
      localStorage.removeItem('cheatsheet-key-' + song.title);
      // Also clean up old format
      localStorage.removeItem('cheatsheet-edits-' + song.title);
      editMode = false;
      document.body.classList.remove('editing');
      document.getElementById('edit-btn').textContent = 'Edit';
      const resetBtn = document.getElementById('reset-btn');
      if (resetBtn) resetBtn.style.display = 'none';
      hideChordPicker();
      renderSong();
    }

    // ===== SECTION MANAGEMENT =====
    function moveSection(index, direction) {
      const song = SONGS[currentIndex];
      const sections = getCurrentSectionsFromDOM();
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= sections.length) return;
      const temp = sections[index];
      sections[index] = sections[newIndex];
      sections[newIndex] = temp;
      saveStructure(song, sections);
      rebuildSectionRows(sections);
    }

    function deleteSection(index) {
      const song = SONGS[currentIndex];
      const sections = getCurrentSectionsFromDOM();
      if (sections.length <= 1) return; // keep at least one
      sections.splice(index, 1);
      saveStructure(song, sections);
      rebuildSectionRows(sections);
    }

    const SECTION_TYPES = ['Intro', 'Verse', 'Pre-Chorus', 'Chorus', 'Bridge', 'Solo', 'Breakdown', 'Instrumental', 'Outro'];

    function showSectionPicker() {
      hideChordPicker();
      const grid = document.getElementById('section-type-grid');
      grid.innerHTML = '';
      SECTION_TYPES.forEach(name => {
        const chip = document.createElement('button');
        chip.className = 'section-type-chip';
        chip.textContent = name;
        chip.addEventListener('click', () => addSectionWithName(name));
        grid.appendChild(chip);
      });
      const customChip = document.createElement('button');
      customChip.className = 'section-type-chip custom';
      customChip.textContent = 'Custom...';
      customChip.addEventListener('click', () => {
        const input = document.getElementById('custom-section-input');
        input.style.display = 'block';
        input.value = '';
        input.focus();
      });
      grid.appendChild(customChip);
      document.getElementById('custom-section-input').style.display = 'none';
      document.getElementById('section-picker').classList.add('visible');
    }

    function hideSectionPicker() {
      document.getElementById('section-picker').classList.remove('visible');
    }

    function addSectionWithName(name) {
      const song = SONGS[currentIndex];
      const sections = getCurrentSectionsFromDOM();
      sections.push({ name: name, chords: '' });
      saveStructure(song, sections);
      rebuildSectionRows(sections);
      hideSectionPicker();
    }

    function getCurrentSectionsFromDOM() {
      const rows = document.querySelectorAll('.section-row');
      const sections = [];
      rows.forEach(row => {
        const label = row.querySelector('.section-label');
        const chords = row.querySelector('.section-chords');
        if (label && chords) {
          sections.push({ name: label.textContent.trim(), chords: chords.textContent.trim() });
        }
      });
      return sections;
    }

    function rebuildSectionRows(sections) {
      const chordArea = document.getElementById('chord-area');
      chordArea.innerHTML = '';
      sections.forEach((section, i) => {
        chordArea.appendChild(createSectionRow(section, i, sections.length));
      });
      // Re-apply edit mode to new rows
      if (editMode) {
        document.querySelectorAll('.section-chords').forEach(el => {
          el.contentEditable = true;
          el.classList.add('editable');
          el.addEventListener('focus', () => showChordPicker(el));
        });
        document.querySelectorAll('.section-label').forEach(el => {
          el.contentEditable = true;
          el.classList.add('editable');
        });
      }
      autoScaleFont();
    }

    // ===== SWIPE NAVIGATION =====
    let touchStartX = 0;
    let touchStartY = 0;

    function initSwipe() {
      const chordArea = document.getElementById('chord-area');
      chordArea.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      chordArea.addEventListener('touchend', (e) => {
        if (editMode) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0 && currentIndex < getSetlistSongs().length - 1) {
          currentIndex++;
          renderSong();
          animateSlide('slide-left');
        } else if (dx > 0 && currentIndex > 0) {
          currentIndex--;
          renderSong();
          animateSlide('slide-right');
        } else {
          const area = document.getElementById('chord-area');
          area.style.transition = 'transform 0.15s';
          area.style.transform = dx < 0 ? 'translateX(-20px)' : 'translateX(20px)';
          setTimeout(() => {
            area.style.transform = '';
            setTimeout(() => area.style.transition = '', 150);
          }, 150);
        }
      }, { passive: true });
    }

    // Render a single chord diagram SVG and return it
    function renderChordSVG(voicing, size) {
      const w = size || 120, h = size ? size * 1.2 : 140;
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width', w); svg.setAttribute('height', h);
      svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);

      const frets = voicing.f, startFret = voicing.s;
      const sw = (w - 40) / 5, fh = (h - 40) / 5;
      const ox = 20, oy = 25, numFrets = 5;

      // Nut
      if (startFret === 0) {
        const nut = document.createElementNS('http://www.w3.org/2000/svg','line');
        Object.entries({x1:ox,y1:oy,x2:ox+sw*5,y2:oy,stroke:'white','stroke-width':3}).forEach(([k,v])=>nut.setAttribute(k,v));
        svg.appendChild(nut);
      } else {
        const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
        Object.entries({x:ox-14,y:oy+fh*0.7,fill:'#999','font-size':'11px','text-anchor':'middle'}).forEach(([k,v])=>txt.setAttribute(k,v));
        txt.textContent = (startFret+1)+'fr';
        svg.appendChild(txt);
      }

      for (let f = 0; f <= numFrets; f++) {
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        Object.entries({x1:ox,y1:oy+f*fh,x2:ox+sw*5,y2:oy+f*fh,stroke:'#555','stroke-width':1}).forEach(([k,v])=>line.setAttribute(k,v));
        svg.appendChild(line);
      }
      for (let s = 0; s < 6; s++) {
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        Object.entries({x1:ox+s*sw,y1:oy,x2:ox+s*sw,y2:oy+numFrets*fh,stroke:'#555','stroke-width':1}).forEach(([k,v])=>line.setAttribute(k,v));
        svg.appendChild(line);
      }

      frets.forEach((fret, s) => {
        const x = ox + s * sw;
        if (fret === null) {
          const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
          Object.entries({x:x,y:oy-8,'text-anchor':'middle',fill:'#999','font-size':'12px'}).forEach(([k,v])=>txt.setAttribute(k,v));
          txt.textContent = 'x'; svg.appendChild(txt);
        } else if (fret === 0) {
          const circ = document.createElementNS('http://www.w3.org/2000/svg','circle');
          Object.entries({cx:x,cy:oy-8,r:4,fill:'none',stroke:'white','stroke-width':2}).forEach(([k,v])=>circ.setAttribute(k,v));
          svg.appendChild(circ);
        } else {
          const displayFret = fret - startFret;
          const cy = oy + (displayFret - 0.5) * fh;
          const circ = document.createElementNS('http://www.w3.org/2000/svg','circle');
          Object.entries({cx:x,cy:cy,r:Math.min(sw/2.5,8),fill:'white'}).forEach(([k,v])=>circ.setAttribute(k,v));
          svg.appendChild(circ);
        }
      });
      return svg;
    }

    // Show ALL chord diagrams for a section (play mode)
    function showSectionChords(chords) {
      const unique = [...new Set(chords)].filter(c => {
        const dc = c.includes('/') ? c.split('/')[0] : c;
        return CHORD_DB[dc];
      });
      if (unique.length === 0) return;

      const box = document.getElementById('chord-chart-box');
      box.innerHTML = '';

      const title = document.createElement('div');
      title.id = 'chord-chart-name';
      title.textContent = 'Chord Shapes';
      box.appendChild(title);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:12px 0';

      unique.forEach(c => {
        const dc = c.includes('/') ? c.split('/')[0] : c;
        const voicings = CHORD_DB[dc];
        if (!voicings) return;

        const card = document.createElement('div');
        card.style.cssText = 'text-align:center';
        const label = document.createElement('div');
        label.style.cssText = 'font-size:16px;font-weight:bold;margin-bottom:4px';
        label.textContent = c;
        card.appendChild(label);
        card.appendChild(renderChordSVG(voicings[0], 100));
        if (voicings.length > 1) {
          const pos = document.createElement('div');
          pos.style.cssText = 'font-size:11px;color:var(--text-muted);margin-top:2px';
          pos.textContent = voicings[0].l;
          card.appendChild(pos);
        }
        grid.appendChild(card);
      });

      box.appendChild(grid);

      const closeBtn = document.createElement('button');
      closeBtn.id = 'chord-chart-close';
      closeBtn.textContent = 'Close';
      closeBtn.addEventListener('click', hideChordChart);
      box.appendChild(closeBtn);

      document.getElementById('chord-chart-modal').classList.add('visible');
    }

    // Show a single chord with voicing picker (edit mode or tap single chord)
    function showChordVoicings(chordName) {
      const dc = chordName.includes('/') ? chordName.split('/')[0] : chordName;
      const voicings = CHORD_DB[dc];
      if (!voicings) return;

      const box = document.getElementById('chord-chart-box');
      box.innerHTML = '';

      const title = document.createElement('div');
      title.id = 'chord-chart-name';
      title.textContent = chordName;
      box.appendChild(title);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin:12px 0';

      voicings.forEach((v, i) => {
        const card = document.createElement('div');
        card.style.cssText = 'text-align:center;cursor:pointer;padding:8px;border-radius:8px;border:2px solid transparent';
        if (i === 0) card.style.borderColor = '#4a9eff';
        card.addEventListener('click', () => {
          // Highlight selected
          grid.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
          card.style.borderColor = '#4a9eff';
        });
        card.appendChild(renderChordSVG(v, 110));
        const pos = document.createElement('div');
        pos.style.cssText = 'font-size:12px;color:var(--text-muted);margin-top:4px';
        pos.textContent = v.l;
        card.appendChild(pos);
        grid.appendChild(card);
      });

      box.appendChild(grid);

      const closeBtn = document.createElement('button');
      closeBtn.id = 'chord-chart-close';
      closeBtn.textContent = 'Close';
      closeBtn.addEventListener('click', hideChordChart);
      box.appendChild(closeBtn);

      document.getElementById('chord-chart-modal').classList.add('visible');
    }

    function hideChordChart() {
      document.getElementById('chord-chart-modal').classList.remove('visible');
    }

    // ===== DIAGRAMS BAR =====
    let diagramsVisible = true;

    function toggleDiagrams() {
      diagramsVisible = !diagramsVisible;
      document.getElementById('diagrams-btn').classList.toggle('active', diagramsVisible);
      if (diagramsVisible) {
        renderDiagramsBar();
      } else {
        document.getElementById('diagrams-bar').classList.remove('visible');
        document.getElementById('diagrams-bar').innerHTML = '';
      }
      autoScaleFont();
    }

    function renderDiagramsBar() {
      const bar = document.getElementById('diagrams-bar');
      bar.innerHTML = '';

      // Collect all unique chords from current song
      const song = SONGS[currentIndex];
      const sections = getEditedSections(song);
      const allChords = [];
      sections.forEach(s => {
        s.chords.split(/\s+/).forEach(c => {
          if (c && !allChords.includes(c)) allChords.push(c);
        });
      });

      // Render each chord that has a diagram
      allChords.forEach(c => {
        const dc = c.includes('/') ? c.split('/')[0] : c;
        const voicings = CHORD_DB[dc];
        if (!voicings) return;

        const card = document.createElement('div');
        card.className = 'diagram-card';
        card.style.cursor = 'pointer';

        const label = document.createElement('div');
        label.className = 'diagram-label';
        label.textContent = c;
        card.appendChild(label);

        card.appendChild(renderChordSVG(voicings[0], 80));

        if (voicings.length > 1) {
          const pos = document.createElement('div');
          pos.className = 'diagram-pos';
          pos.textContent = voicings[0].l;
          card.appendChild(pos);
        }

        // Tap to see all voicings
        card.addEventListener('click', () => showChordVoicings(c));

        bar.appendChild(card);
      });

      bar.classList.add('visible');
    }

    // Tap chords: play mode → show all section charts, edit mode → show voicings
    function attachChordTapHandlers() {
      document.querySelectorAll('.section-chords').forEach(el => {
        el.addEventListener('click', (e) => {
          if (editMode) return; // edit mode has its own chord picker
          const chords = el.textContent.trim().split(/\s+/);
          if (chords.length === 1) {
            showChordVoicings(chords[0]);
          } else {
            showSectionChords(chords);
          }
        });
      });
    }

    // ===== SETLIST MANAGEMENT (multi-setlist) =====
    // Data model: localStorage 'cheatsheet-setlists' = { lists: { id: { name, songTitles[] } }, activeId }
    // SONGS array order is the active setlist order. Songs not in setlist are still in SONGS but hidden.

    function getSetlistData() {
      const saved = localStorage.getItem('cheatsheet-setlists');
      if (saved) return JSON.parse(saved);
      // Default: one setlist with all songs
      const defaultList = { name: 'GM Tribute', songTitles: SONGS.map(s => s.title) };
      return { lists: { 'default': defaultList }, activeId: 'default' };
    }

    function saveSetlistData(data) {
      localStorage.setItem('cheatsheet-setlists', JSON.stringify(data));
    }

    function getActiveSetlist() {
      const data = getSetlistData();
      return data.lists[data.activeId] || Object.values(data.lists)[0];
    }

    function switchToSetlist(id) {
      const data = getSetlistData();
      data.activeId = id;
      saveSetlistData(data);
      currentIndex = 0;
      renderSong();
      renderBottomBar();
    }

    // Get songs for current setlist (ordered)
    function getSetlistSongs() {
      const setlist = getActiveSetlist();
      if (!setlist) return SONGS;
      return setlist.songTitles.map(t => SONGS.find(s => s.title === t)).filter(Boolean);
    }

    function showSetlistScreen() {
      const data = getSetlistData();
      const screen = document.getElementById('setlist-screen');

      // Render tabs
      const tabs = document.getElementById('setlist-tabs');
      tabs.innerHTML = '';
      Object.entries(data.lists).forEach(([id, list]) => {
        const tab = document.createElement('button');
        tab.className = 'setlist-tab' + (id === data.activeId ? ' active' : '');
        tab.textContent = list.name;
        tab.addEventListener('click', () => {
          data.activeId = id;
          saveSetlistData(data);
          showSetlistScreen();
        });
        tabs.appendChild(tab);
      });

      // New setlist button
      const newBtn = document.createElement('button');
      newBtn.id = 'new-setlist-btn';
      newBtn.textContent = '+ New';
      newBtn.addEventListener('click', () => {
        const input = document.getElementById('setlist-name-input');
        input.style.display = 'block';
        input.value = '';
        input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            const newId = 'sl-' + Date.now();
            data.lists[newId] = { name: input.value.trim(), songTitles: [] };
            data.activeId = newId;
            saveSetlistData(data);
            input.style.display = 'none';
            showSetlistScreen();
          }
        };
      });
      tabs.appendChild(newBtn);

      // Hide name input
      document.getElementById('setlist-name-input').style.display = 'none';

      // Active setlist info
      const activeList = data.lists[data.activeId];
      const isDefault = data.activeId === 'default';

      // Show/hide delete button (can't delete default)
      document.getElementById('delete-setlist-btn').style.display = isDefault ? 'none' : '';

      // Render songs
      const container = document.getElementById('setlist-songs');
      container.innerHTML = '';

      const songTitles = activeList.songTitles;
      songTitles.forEach((title, i) => {
        const song = SONGS.find(s => s.title === title);
        if (!song) return;

        const item = document.createElement('div');
        item.className = 'setlist-item';
        item.draggable = true;

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '\u2630';

        const info = document.createElement('div');
        info.className = 'song-info';
        const nameEl = document.createElement('div');
        nameEl.className = 'song-name';
        nameEl.textContent = (i + 1) + '. ' + song.title;
        const meta = document.createElement('div');
        meta.className = 'song-meta';
        meta.textContent = 'Key: ' + getCurrentKey(song) + ' | ' + song.bpm + ' BPM | ' + song.timeSignature;
        info.appendChild(nameEl);
        info.appendChild(meta);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = 'Remove';
        removeBtn.addEventListener('click', () => {
          activeList.songTitles.splice(i, 1);
          saveSetlistData(data);
          showSetlistScreen();
          if (currentIndex >= activeList.songTitles.length) currentIndex = Math.max(0, activeList.songTitles.length - 1);
          renderSong();
          renderBottomBar();
        });

        // Drag reorder
        item.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', i);
          item.classList.add('dragging');
        });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
        item.addEventListener('dragover', (e) => e.preventDefault());
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
          if (fromIdx !== i) {
            const moved = activeList.songTitles.splice(fromIdx, 1)[0];
            activeList.songTitles.splice(i, 0, moved);
            saveSetlistData(data);
            showSetlistScreen();
            renderBottomBar();
          }
        });

        info.addEventListener('click', () => {
          currentIndex = i;
          hideSetlistScreen();
          renderSong();
        });

        item.appendChild(handle);
        item.appendChild(info);
        item.appendChild(removeBtn);
        container.appendChild(item);
      });

      // "Add Song" — show songs NOT in this setlist
      const addBtn = document.getElementById('setlist-add-btn');
      addBtn.textContent = '+ Add Song';
      addBtn.onclick = () => showAddSongPicker(data, activeList);

      screen.classList.add('visible');
    }

    function showAddSongPicker(data, activeList) {
      const container = document.getElementById('setlist-songs');
      container.innerHTML = '';
      const head = document.createElement('div');
      head.style.cssText = 'padding:8px 0;font-size:14px;color:var(--text-muted)';
      head.textContent = 'Tap to add:';
      container.appendChild(head);

      SONGS.forEach(song => {
        const alreadyIn = activeList.songTitles.includes(song.title);
        const item = document.createElement('div');
        item.className = 'setlist-item';
        item.style.opacity = alreadyIn ? '0.3' : '1';

        const info = document.createElement('div');
        info.className = 'song-info';
        const nameEl = document.createElement('div');
        nameEl.className = 'song-name';
        nameEl.textContent = (alreadyIn ? '\u2713 ' : '+ ') + song.title;
        const meta = document.createElement('div');
        meta.className = 'song-meta';
        meta.textContent = 'Key: ' + getCurrentKey(song) + ' | ' + song.bpm + ' BPM';
        info.appendChild(nameEl);
        info.appendChild(meta);
        item.appendChild(info);

        if (!alreadyIn) {
          item.style.cursor = 'pointer';
          item.addEventListener('click', () => {
            activeList.songTitles.push(song.title);
            saveSetlistData(data);
            showSetlistScreen();
            renderBottomBar();
          });
        }
        container.appendChild(item);
      });
    }

    function hideSetlistScreen() {
      document.getElementById('setlist-screen').classList.remove('visible');
    }

    function animateSlide(className) {
      const area = document.getElementById('chord-area');
      area.classList.remove('slide-left', 'slide-right');
      void area.offsetWidth; // force reflow
      area.classList.add(className);
      area.addEventListener('animationend', () => area.classList.remove(className), { once: true });
    }

    // ===== SERVICE WORKER =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      // Theme
      const savedTheme = localStorage.getItem('cheatsheet-theme');
      if (savedTheme === 'light') document.body.classList.add('light');

      const themeBtn = document.getElementById('theme-btn');
      function updateThemeBtn() {
        themeBtn.textContent = document.body.classList.contains('light') ? '\uD83C\uDF19' : '\u2600\uFE0F';
      }
      updateThemeBtn();
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light');
        localStorage.setItem('cheatsheet-theme',
          document.body.classList.contains('light') ? 'light' : 'dark');
        updateThemeBtn();
      });

      // Stage mode toggle
      const stageBtn = document.getElementById('stage-btn');
      stageBtn.addEventListener('click', () => {
        document.body.classList.toggle('stage');
        stageBtn.textContent = document.body.classList.contains('stage') ? 'Exit Stage' : 'Stage';
      });

      // Stay-awake tip
      if (!localStorage.getItem('cheatsheet-awake-dismissed')) {
        document.getElementById('awake-tip').style.display = 'flex';
      }
      document.getElementById('awake-dismiss').addEventListener('click', () => {
        document.getElementById('awake-tip').style.display = 'none';
        localStorage.setItem('cheatsheet-awake-dismissed', '1');
      });

      // Chord chart close
      document.getElementById('chord-chart-close').addEventListener('click', hideChordChart);
      document.getElementById('chord-chart-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('chord-chart-modal')) hideChordChart();
      });

      // Diagrams toggle (visible by default)
      document.getElementById('diagrams-btn').classList.add('active');
      document.getElementById('diagrams-btn').addEventListener('click', toggleDiagrams);

      // Setlist button
      document.getElementById('setlist-btn').addEventListener('click', showSetlistScreen);
      document.getElementById('setlist-close').addEventListener('click', () => {
        hideSetlistScreen();
        currentIndex = 0;
        renderSong();
      });

      // Rename setlist
      document.getElementById('rename-setlist-btn').addEventListener('click', () => {
        const data = getSetlistData();
        const list = data.lists[data.activeId];
        const input = document.getElementById('setlist-name-input');
        input.style.display = 'block';
        input.value = list.name;
        input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            list.name = input.value.trim();
            saveSetlistData(data);
            input.style.display = 'none';
            showSetlistScreen();
          }
        };
      });

      // Delete setlist
      document.getElementById('delete-setlist-btn').addEventListener('click', () => {
        const data = getSetlistData();
        if (data.activeId === 'default') return;
        delete data.lists[data.activeId];
        data.activeId = Object.keys(data.lists)[0];
        saveSetlistData(data);
        currentIndex = 0;
        showSetlistScreen();
        renderSong();
        renderBottomBar();
      });

      // Edit button
      document.getElementById('edit-btn').addEventListener('click', () => {
        if (editMode) exitEditMode();
        else enterEditMode();
      });

      // Add section button
      document.getElementById('add-section-btn').addEventListener('click', showSectionPicker);

      // Section picker close
      document.getElementById('section-picker-close').addEventListener('click', hideSectionPicker);

      // Custom section input - enter key
      document.getElementById('custom-section-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const name = e.target.value.trim();
          if (name) addSectionWithName(name);
        }
      });

      // Chord picker close
      document.getElementById('picker-close').addEventListener('click', hideChordPicker);

      // Transpose buttons — permanent key change
      document.getElementById('transpose-up').addEventListener('click', () => {
        permanentTranspose(1);
      });
      document.getElementById('transpose-down').addEventListener('click', () => {
        permanentTranspose(-1);
      });

      // Swipe
      initSwipe();

      // One-time cleanup: clear any corrupted localStorage from transpose bug
      if (!localStorage.getItem('cheatsheet-bugfix-v3')) {
        SONGS.forEach(s => {
          localStorage.removeItem('cheatsheet-sections-' + s.title);
          localStorage.removeItem('cheatsheet-edits-' + s.title);
          localStorage.removeItem('cheatsheet-notes-' + s.title);
          localStorage.removeItem('cheatsheet-key-' + s.title);
        });
        localStorage.setItem('cheatsheet-bugfix-v3', '1');
      }

      // Render first song
      renderSong();
    });
  </script>
</body>
</html>
